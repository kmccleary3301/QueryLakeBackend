name: SDK Checks

on:
  pull_request:
    paths:
      - "sdk/python/**"
      - "docs/sdk/**"
      - "docs/setup/**"
      - "README.md"
      - "Makefile"
  push:
    branches: ["main"]
    paths:
      - "sdk/python/**"
      - "docs/sdk/**"
      - "docs/setup/**"
      - "README.md"
      - "Makefile"

jobs:
  sdk-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run SDK CI checks
        run: bash scripts/ci_sdk_checks.sh

      - name: Upload SDK dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist-${{ github.run_id }}-${{ github.run_attempt }}
          path: sdk/python/dist
          retention-days: 14
