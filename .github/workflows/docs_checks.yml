name: Docs Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
      - "sdk/python/README.md"
      - "docs/**"
      - "scripts/ci_docs_checks.py"
      - "scripts/ci_docs_checks.sh"
      - "Makefile"
      - ".github/workflows/docs_checks.yml"
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
      - "sdk/python/README.md"
      - "docs/**"
      - "scripts/ci_docs_checks.py"
      - "scripts/ci_docs_checks.sh"
      - "Makefile"
      - ".github/workflows/docs_checks.yml"

concurrency:
  group: docs-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Run docs checks
        run: make ci-docs
