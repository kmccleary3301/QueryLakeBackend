name: CI Runtime Profiler

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days"
        required: true
        default: "7"
      max_runs:
        description: "Maximum runs to inspect"
        required: true
        default: "1000"
      max_p95_regression_pct:
        description: "Allowed overall p95 runtime regression (%)"
        required: true
        default: "15"
      max_compute_regression_pct:
        description: "Allowed overall compute-minute regression (%)"
        required: true
        default: "20"
      fail_on_regression:
        description: "Fail workflow when delta gate fails"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "40 7 * * *"

permissions:
  actions: read
  contents: read

jobs:
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build runtime profile
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          MAX_RUNS="${{ github.event.inputs.max_runs || '1000' }}"
          TS="$(date -u +%Y%m%d-%H%M%S)"
          OUT_DIR="docs_tmp/RAG/ci/runtime_profile/${TS}"
          mkdir -p "${OUT_DIR}"
          python scripts/dev/ci_runtime_profile.py \
            --repo "${{ github.repository }}" \
            --days "${DAYS}" \
            --max-runs "${MAX_RUNS}" \
            --out-json "${OUT_DIR}/profile.json" \
            --out-md "${OUT_DIR}/profile.md"
          cp "${OUT_DIR}/profile.json" "${OUT_DIR}/latest.json"
          cp "${OUT_DIR}/profile.md" "${OUT_DIR}/latest.md"
          echo "out_dir=${OUT_DIR}" >> "$GITHUB_OUTPUT"
        id: profile

      - name: Optional delta from committed baseline
        id: delta
        run: |
          BASELINE="docs_tmp/RAG/ci/runtime_profile/baseline/latest.json"
          CURRENT="${{ steps.profile.outputs.out_dir }}/profile.json"
          if [[ -f "${BASELINE}" ]]; then
            MAX_P95="${{ github.event.inputs.max_p95_regression_pct || '15' }}"
            MAX_COMPUTE="${{ github.event.inputs.max_compute_regression_pct || '20' }}"
            FAIL_ON_REGRESSION="false"
            if [[ "${{ github.event_name }}" == "schedule" ]]; then
              FAIL_ON_REGRESSION="true"
            fi
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.fail_on_regression || 'false' }}" == "true" ]]; then
              FAIL_ON_REGRESSION="true"
            fi
            EXTRA_ARGS=()
            if [[ "${FAIL_ON_REGRESSION}" == "true" ]]; then
              EXTRA_ARGS+=(--fail-on-regression)
            fi
            python scripts/dev/ci_runtime_delta.py \
              --before-json "${BASELINE}" \
              --after-json "${CURRENT}" \
              --out-md "${{ steps.profile.outputs.out_dir }}/delta.md" \
              --max-p95-regression-pct "${MAX_P95}" \
              --max-compute-regression-pct "${MAX_COMPUTE}" \
              "${EXTRA_ARGS[@]}" | tee "${{ steps.profile.outputs.out_dir }}/delta_gate.json"
            DELTA_STATUS="$(python - <<'PY'
            import json
            from pathlib import Path
            path = Path("${{ steps.profile.outputs.out_dir }}/delta_gate.json")
            data = json.loads(path.read_text(encoding="utf-8"))
            print(data.get("status", "n/a"))
            PY
            )"
            echo "delta_status=${DELTA_STATUS}" >> "$GITHUB_OUTPUT"
            echo "delta_max_p95=${MAX_P95}" >> "$GITHUB_OUTPUT"
            echo "delta_max_compute=${MAX_COMPUTE}" >> "$GITHUB_OUTPUT"
            echo "delta_fail_on_regression=${FAIL_ON_REGRESSION}" >> "$GITHUB_OUTPUT"
          else
            echo "No baseline at ${BASELINE}; skipping delta."
            echo "delta_status=baseline_missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish summary
        run: |
          {
            echo "## CI Runtime Profiler";
            echo "";
            echo "- Repository: \`${{ github.repository }}\`";
            echo "- Output dir: \`${{ steps.profile.outputs.out_dir }}\`";
            echo "- Profile report: \`${{ steps.profile.outputs.out_dir }}/profile.md\`";
            echo "- Delta gate status: \`${{ steps.delta.outputs.delta_status || 'baseline_missing' }}\`";
            echo "- Delta thresholds (p95/compute): \`${{ steps.delta.outputs.delta_max_p95 || 'n/a' }}% / ${{ steps.delta.outputs.delta_max_compute || 'n/a' }}%\`";
            echo "- Delta fail-on-regression: \`${{ steps.delta.outputs.delta_fail_on_regression || 'false' }}\`";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload profiler artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-runtime-profile-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ steps.profile.outputs.out_dir }}/profile.json
            ${{ steps.profile.outputs.out_dir }}/profile.md
            ${{ steps.profile.outputs.out_dir }}/delta.md
            ${{ steps.profile.outputs.out_dir }}/delta_gate.json
          if-no-files-found: ignore
          retention-days: 21
