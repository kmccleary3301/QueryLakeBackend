repos:
  - repo: local
    hooks:
      - id: sdk-ruff
        name: SDK Ruff
        entry: bash scripts/dev/sdk_quality_gate.sh lint
        language: system
        pass_filenames: false
        files: ^sdk/python/
        stages: [pre-commit, manual]

      - id: sdk-mypy
        name: SDK MyPy
        entry: bash scripts/dev/sdk_quality_gate.sh type
        language: system
        pass_filenames: false
        files: ^sdk/python/src/querylake_sdk/
        stages: [pre-push, manual]

      - id: sdk-tests
        name: SDK Tests
        entry: bash scripts/dev/sdk_quality_gate.sh test
        language: system
        pass_filenames: false
        files: ^sdk/python/
        stages: [pre-push, manual]
